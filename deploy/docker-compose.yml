services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: emo
      POSTGRES_PASSWORD: qwe.123
      POSTGRES_DB: postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
